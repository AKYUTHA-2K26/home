<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Event Details | AKYUTHA 2K26</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header class="navbar">

        <div class="logo-area">
            <img src="media/logos/fest-logo.png" alt="logo">
            <img src="media/logos/university-logo.png" alt="logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
        </nav>

    </header>

    <section class="event-container">

        <div class="event-left">

            <img id="event-image" src="" alt="event image">

        </div>

        <div class="event-right">

            <h1 id="event-title"></h1>

            <div class="event-meta">

                <p><strong>Category:</strong> <span id="event-category"></span></p>
                <p><strong>Participation:</strong> <span id="event-participation"></span></p>
                <p><strong>Team Size:</strong> <span id="event-team"></span></p>
                <p><strong>Registration Fee:</strong> <span id="event-fee"></span></p>

            </div>

            <div class="event-section">

                <h3>Description</h3>
                <p id="event-description"></p>

            </div>

            <div class="event-section">

                <h3>Event Flow</h3>
                <ul id="event-flow"></ul>

            </div>

            <div class="event-section">

                <h3>Winning Criteria</h3>
                <p id="event-winning"></p>

            </div>

            <div class="event-section">

                <h3>Prize</h3>
                <p id="event-prize"></p>

            </div>

            <div class="event-actions">

                <a id="register-btn" class="action-btn register-btn" target="_blank">
                    Register
                </a>

                <img id="qr-image" src="" alt="">

                <p id="spot-note"></p>

            </div>

            <a href="index.html" class="back-btn">← Back to Events</a>

        </div>

    </section>

    <script src="js/event.js"></script>

</body>

</html>
